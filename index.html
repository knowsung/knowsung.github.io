<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>챗봇 성능 점검기</title>
<style>
  :root {
    --navy: #1F3864;
    --blue: #2E75B6;
    --light-blue: #EBF3FB;
    --orange: #E36B1A;
    --gray: #595959;
    --light-gray: #F5F5F5;
    --border: #D9D9D9;
    --pass: #375623;
    --pass-bg: #E2EFDA;
    --fail: #C00000;
    --fail-bg: #FFE0E0;
    --skip-bg: #FFF3CD;
    --skip: #856404;
    --white: #FFFFFF;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Noto Sans KR', 'Malgun Gothic', sans-serif; background: #F0F4F8; color: #222; }

  header {
    background: var(--navy);
    color: white;
    padding: 20px 32px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 12px;
  }
  header h1 { font-size: 20px; font-weight: 700; letter-spacing: -0.3px; }
  header p { font-size: 13px; color: #9DC3E6; margin-top: 2px; }
  .header-right { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }

  .btn {
    padding: 8px 16px; border-radius: 6px; font-size: 13px; font-weight: 600;
    cursor: pointer; border: none; transition: all 0.15s;
  }
  .btn-white { background: white; color: var(--navy); }
  .btn-white:hover { background: #EBF3FB; }
  .btn-orange { background: var(--orange); color: white; }
  .btn-orange:hover { background: #c55a12; }
  .btn-blue { background: var(--blue); color: white; }
  .btn-blue:hover { background: #1a5a9a; }
  .btn-sm { padding: 5px 11px; font-size: 12px; border-radius: 4px; }

  main { max-width: 1100px; margin: 0 auto; padding: 24px 20px; }

  .top-bar {
    display: flex; align-items: center; justify-content: space-between;
    flex-wrap: wrap; gap: 12px; margin-bottom: 20px;
  }
  .set-selector {
    display: flex; align-items: center; gap: 10px;
    background: white; border: 1px solid var(--border);
    border-radius: 8px; padding: 10px 16px;
  }
  .set-selector label { font-size: 13px; color: var(--gray); font-weight: 600; }
  .set-selector select {
    border: none; font-size: 14px; font-weight: 700;
    color: var(--navy); background: transparent; cursor: pointer; outline: none;
  }

  .score-bar {
    display: grid; grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
    gap: 12px; margin-bottom: 24px;
  }
  .score-card {
    background: white; border-radius: 10px; border: 1px solid var(--border);
    padding: 14px 16px; text-align: center;
  }
  .score-card .num { font-size: 28px; font-weight: 700; }
  .score-card .lbl { font-size: 12px; color: var(--gray); margin-top: 2px; }
  .score-card.pass .num { color: var(--pass); }
  .score-card.fail .num { color: var(--fail); }
  .score-card.total .num { color: var(--navy); }
  .score-card.pct .num { color: var(--orange); }

  .progress-wrap { background: white; border-radius: 10px; border: 1px solid var(--border); padding: 16px 20px; margin-bottom: 24px; }
  .progress-label { display: flex; justify-content: space-between; font-size: 13px; margin-bottom: 8px; }
  .progress-track { height: 10px; background: #EEE; border-radius: 99px; overflow: hidden; }
  .progress-fill { height: 100%; background: linear-gradient(90deg, #2E75B6, #375623); border-radius: 99px; transition: width 0.4s; }

  .q-list { display: flex; flex-direction: column; gap: 14px; }

  .q-card {
    background: white; border-radius: 10px;
    border: 1px solid var(--border); overflow: hidden;
    transition: box-shadow 0.15s;
  }
  .q-card:hover { box-shadow: 0 2px 12px rgba(0,0,0,0.07); }
  .q-card.pass-card { border-left: 4px solid var(--pass); }
  .q-card.fail-card { border-left: 4px solid var(--fail); }
  .q-card.skip-card { border-left: 4px solid #FFC107; }

  .q-header {
    display: flex; align-items: flex-start; gap: 12px;
    padding: 14px 18px; cursor: pointer;
  }
  .q-num {
    min-width: 28px; height: 28px; border-radius: 50%;
    background: var(--light-blue); color: var(--navy);
    display: flex; align-items: center; justify-content: center;
    font-size: 13px; font-weight: 700; flex-shrink: 0; margin-top: 1px;
  }
  .q-text { flex: 1; }
  .q-title { font-size: 14px; font-weight: 700; color: #111; line-height: 1.5; }
  .q-meta { font-size: 12px; color: var(--gray); margin-top: 3px; }
  .q-badge {
    padding: 3px 10px; border-radius: 99px; font-size: 11px; font-weight: 700;
    flex-shrink: 0; margin-top: 2px;
  }
  .badge-pass { background: var(--pass-bg); color: var(--pass); }
  .badge-fail { background: var(--fail-bg); color: var(--fail); }
  .badge-skip { background: var(--skip-bg); color: var(--skip); }
  .badge-none { background: #EEE; color: #888; }

  .q-body { border-top: 1px solid #EEE; padding: 14px 18px 18px; display: none; }
  .q-body.open { display: block; }

  .field-label { font-size: 12px; font-weight: 700; color: var(--gray); margin-bottom: 5px; text-transform: uppercase; letter-spacing: 0.5px; }
  .keyword-list { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 14px; }
  .kw-tag {
    padding: 3px 10px; border-radius: 99px; font-size: 12px;
    background: var(--light-blue); color: var(--navy); font-weight: 600;
    cursor: pointer; border: 1.5px solid transparent; transition: all 0.15s;
  }
  .kw-tag:hover { background: #D0E8F8; }
  .kw-tag.found { background: var(--pass-bg); color: var(--pass); border-color: var(--pass); }
  .kw-tag.missing { background: var(--fail-bg); color: var(--fail); border-color: var(--fail); }

  .answer-box {
    width: 100%; min-height: 100px; border: 1px solid var(--border);
    border-radius: 8px; padding: 10px 12px; font-size: 13px;
    font-family: inherit; resize: vertical; outline: none; transition: border 0.15s;
    line-height: 1.6;
  }
  .answer-box:focus { border-color: var(--blue); }

  .judge-row { display: flex; gap: 8px; margin-top: 10px; align-items: center; flex-wrap: wrap; }
  .judge-btn {
    padding: 6px 18px; border-radius: 6px; font-size: 13px; font-weight: 700;
    cursor: pointer; border: 2px solid transparent; transition: all 0.15s;
  }
  .judge-pass { background: var(--pass-bg); color: var(--pass); border-color: var(--pass); }
  .judge-pass:hover, .judge-pass.active { background: var(--pass); color: white; }
  .judge-fail { background: var(--fail-bg); color: var(--fail); border-color: var(--fail); }
  .judge-fail:hover, .judge-fail.active { background: var(--fail); color: white; }
  .judge-skip { background: var(--skip-bg); color: var(--skip); border-color: #FFC107; }
  .judge-skip:hover, .judge-skip.active { background: #FFC107; color: #4a3800; }
  .auto-check-btn { margin-left: auto; }

  .hint { font-size: 12px; color: var(--gray); margin-top: 8px; }

  .modal-overlay {
    display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5);
    z-index: 100; align-items: center; justify-content: center;
  }
  .modal-overlay.open { display: flex; }
  .modal {
    background: white; border-radius: 12px; padding: 28px;
    width: 90%; max-width: 560px; max-height: 85vh; overflow-y: auto;
  }
  .modal h2 { font-size: 18px; font-weight: 700; color: var(--navy); margin-bottom: 16px; }
  .modal textarea {
    width: 100%; height: 320px; border: 1px solid var(--border); border-radius: 8px;
    padding: 10px 12px; font-size: 12px; font-family: monospace; resize: vertical;
  }
  .modal-btns { display: flex; gap: 8px; justify-content: flex-end; margin-top: 14px; }

  .result-modal .result-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 16px; }
  .result-item { background: var(--light-gray); border-radius: 8px; padding: 12px; text-align: center; }
  .result-item .rn { font-size: 24px; font-weight: 700; }
  .result-item .rl { font-size: 12px; color: var(--gray); }
  .result-bar { height: 12px; background: #EEE; border-radius: 99px; overflow: hidden; margin: 10px 0; }
  .result-fill { height: 100%; border-radius: 99px; }

  .export-area { background: var(--light-gray); border-radius: 8px; padding: 12px; font-size: 12px; font-family: monospace; white-space: pre-wrap; max-height: 200px; overflow-y: auto; margin-top: 12px; }

  @media (max-width: 600px) {
    header { padding: 16px 16px; }
    main { padding: 16px 12px; }
    .q-header { padding: 12px 14px; }
    .q-body { padding: 12px 14px 16px; }
  }
</style>
</head>
<body>

<header>
  <div>
    <h1>🤖 챗봇 성능 점검기</h1>
    <p>질문 세트를 선택하고 실제 답변을 입력하여 챗봇 성능을 점검하세요</p>
  </div>
  <div class="header-right">
    <button class="btn btn-white" onclick="openImport()">📂 세트 불러오기</button>
    <button class="btn btn-white" onclick="openExport()">📤 내보내기</button>
    <button class="btn btn-orange" onclick="showResult()">📊 결과 보기</button>
  </div>
</header>

<main>
  <div class="top-bar">
    <div class="set-selector">
      <label>테스트 세트</label>
      <select id="setSelect" onchange="loadSet(this.value)">
        <option value="universal" selected>🏭 제조업 범용 테스트 세트</option>
        <option value="qc">품질관리 챗봇 (셰익스제조 전용)</option>
        <option value="custom">사용자 정의 세트</option>
      </select>
    </div>
    <div style="display:flex; gap:8px;">
      <button class="btn btn-sm btn-blue" onclick="resetAll()">초기화</button>
      <button class="btn btn-sm btn-orange" onclick="autoCheckAll()">자동 키워드 체크</button>
    </div>
  </div>

  <div class="score-bar">
    <div class="score-card total"><div class="num" id="sc-total">10</div><div class="lbl">전체 문항</div></div>
    <div class="score-card pass"><div class="num" id="sc-pass">0</div><div class="lbl">합격 ✅</div></div>
    <div class="score-card fail"><div class="num" id="sc-fail">0</div><div class="lbl">불합격 ❌</div></div>
    <div class="score-card pct"><div class="num" id="sc-pct">0%</div><div class="lbl">점수</div></div>
  </div>

  <div class="progress-wrap">
    <div class="progress-label">
      <span style="font-size:13px; font-weight:600;">진행률</span>
      <span id="prog-label" style="font-size:13px; color:var(--gray);">0 / 10 완료</span>
    </div>
    <div class="progress-track"><div class="progress-fill" id="prog-fill" style="width:0%"></div></div>
  </div>

  <div class="q-list" id="qList"></div>
</main>

<!-- Import Modal -->
<div class="modal-overlay" id="importModal">
  <div class="modal">
    <h2>📂 질문 세트 불러오기 (JSON)</h2>
    <p style="font-size:13px; color:var(--gray); margin-bottom:10px;">아래 형식의 JSON을 붙여넣으면 새 세트로 등록됩니다.</p>
    <textarea id="importText" placeholder='{
  "name": "HR 챗봇 테스트",
  "questions": [
    {
      "q": "연차 신청은 어떻게 하나요?",
      "type": "절차 안내",
      "keywords": ["그룹웨어", "5일 전", "팀장 승인"]
    }
  ]
}'></textarea>
    <div class="modal-btns">
      <button class="btn btn-white" onclick="closeModal('importModal')">취소</button>
      <button class="btn btn-blue" onclick="applyImport()">불러오기</button>
    </div>
  </div>
</div>

<!-- Export Modal -->
<div class="modal-overlay" id="exportModal">
  <div class="modal">
    <h2>📤 결과 내보내기</h2>
    <div class="export-area" id="exportContent"></div>
    <div class="modal-btns">
      <button class="btn btn-white" onclick="closeModal('exportModal')">닫기</button>
      <button class="btn btn-blue" onclick="copyExport()">복사</button>
    </div>
  </div>
</div>

<!-- Result Modal -->
<div class="modal-overlay" id="resultModal">
  <div class="modal result-modal">
    <h2>📊 최종 점검 결과</h2>
    <div class="result-grid" id="resultGrid"></div>
    <div class="result-bar"><div class="result-fill" id="resultFill" style="width:0%"></div></div>
    <p id="resultComment" style="font-size:14px; font-weight:600; text-align:center; margin:8px 0;"></p>
    <div class="export-area" id="resultDetail"></div>
    <div class="modal-btns">
      <button class="btn btn-white" onclick="closeModal('resultModal')">닫기</button>
      <button class="btn btn-orange" onclick="copyExport(); closeModal('resultModal')">결과 복사</button>
    </div>
  </div>
</div>

<script>
const SETS = {
  universal:{
    name:"제조업 범용 테스트 세트",
    questions:[
      {q:"이번 주 생산량 5,000개 중 불량 35개 발생했어. 불량률 계산하고 목표 0.5% 대비 상태 알려줘.",type:"계산·분석",keywords:["0.7%","초과","목표","0.5%"]},
      {q:"외관 불량 판정 기준이 뭐야? 합격·불합격 구분 방법 알려줘.",type:"판정 기준",keywords:["기준","합격","불합격","육안","치수"]},
      {q:"치수 불량이 반복 발생하고 있어. 근본 원인 분석 방법 알려줘.",type:"원인 분석",keywords:["4M","5-Why","특성요인도","원인","분석"]},
      {q:"고객 클레임이 접수됐어. 초기 대응 절차를 8D 방식으로 알려줘.",type:"절차 안내",keywords:["D1","D2","D3","봉쇄","격리","TF"]},
      {q:"협력사에서 납품된 부품을 수입 검사해야 해. 샘플링 방법이랑 합격 판정 기준 알려줘.",type:"검사 기준",keywords:["샘플링","로트","합격","Ac","AQL"]},
      {q:"불량 보고서 작성할 때 꼭 들어가야 하는 항목이 뭐야?",type:"양식 안내",keywords:["발생일","공정","수량","원인","조치","재발방지"]},
      {q:"시정조치(CAPA) 완료 후 효과가 있는지 어떻게 확인해?",type:"검증 방법",keywords:["효과 검증","불량률","비교","추적","재발"]},
      {q:"출하 전 최종 검사에서 확인해야 할 항목이 뭐야?",type:"출하 검사",keywords:["외관","치수","기능","성적서","샘플링"]},
      {q:"공정 중 불량률이 갑자기 올라갔어. 즉시 취해야 할 조치 순서 알려줘.",type:"긴급 대응",keywords:["라인 정지","격리","원인","보고","조치"]},
      {q:"품질 개선 활동 결과를 경영진에게 보고할 때 어떤 형식이 좋아?",type:"보고서 형식",keywords:["현황","원인","조치","효과","수치","그래프"]},
    ]
  },

  qc: {
    name: "품질관리 챗봇 (제조업)",
    questions: [
      { q: "DEF-INJ-003 코드 불량 원인과 시정조치를 알려줘.", type: "코드 조회", keywords: ["플래시", "Flash", "버", "형체력", "금형", "클리어런스"] },
      { q: "사출 공정 외관 불량 판정 기준을 알려줘.", type: "매뉴얼 인용", keywords: ["0.2mm", "수축", "웰드", "0.3mm", "4.1", "4.2"] },
      { q: "오늘 사출 라인에서 수축 흔적 20개 발생했어. 생산량 4000개 기준 불량률 계산해줘.", type: "계산·분석", keywords: ["0.5%", "0.5 %", "목표", "기준"] },
      { q: "프레스 DEF-PRS-002 코드 시정조치 절차를 단계별로 알려줘.", type: "절차 안내", keywords: ["균열", "Crack", "소재", "R 반경", "자분"] },
      { q: "고객 클레임 발생 시 첫 대응 절차를 8D 기준으로 알려줘.", type: "절차 안내", keywords: ["D1", "D2", "D3", "봉쇄", "격리", "TF"] },
      { q: "도장 공정 핀홀 허용 기준과 관련 불량 코드를 알려줘.", type: "코드 조회", keywords: ["DEF-PNT-001", "0.3mm", "핀홀", "Pin Hole", "부스"] },
      { q: "이번 달 공정 불량률이 3.2%인데 목표 대비 상태를 알려줘.", type: "목표 비교", keywords: ["0.5%", "초과", "목표", "개선"] },
      { q: "1차 협력사 부품 수입 검사 기준과 샘플링 방법을 알려줘.", type: "검사 기준", keywords: ["샘플링", "로트", "KS Q", "2859", "AQL", "Ac", "QF-001"] },
      { q: "QF-003 불량 보고서 작성 방법을 알려줘.", type: "양식 안내", keywords: ["QF-003", "불량 보고서", "5W1H", "원인", "조치"] },
      { q: "내부 감사 전 준비 체크리스트 항목을 알려줘.", type: "체크리스트", keywords: ["문서", "기록", "현장", "개정", "ISO", "감사"] },
    ]
  },
  custom: {
    name: "사용자 정의 세트",
    questions: [
      { q: "여기에 테스트할 질문을 입력하세요.", type: "사용자 정의", keywords: ["키워드1", "키워드2"] },
    ]
  }
};

let currentSet = "universal";
let answers = {};
let verdicts = {};

function loadSet(key) {
  currentSet = key;
  answers = {};
  verdicts = {};
  render();
}

function render() {
  const set = SETS[currentSet];
  const ql = document.getElementById("qList");
  ql.innerHTML = "";
  set.questions.forEach((q, i) => {
    const verdict = verdicts[i] || "none";
    const cardClass = verdict === "pass" ? "pass-card" : verdict === "fail" ? "fail-card" : verdict === "skip" ? "skip-card" : "";
    const badgeClass = verdict === "pass" ? "badge-pass" : verdict === "fail" ? "badge-fail" : verdict === "skip" ? "badge-skip" : "badge-none";
    const badgeText = verdict === "pass" ? "✅ 합격" : verdict === "fail" ? "❌ 불합격" : verdict === "skip" ? "⏭ 건너뜀" : "미평가";

    const kwHtml = q.keywords.map(kw => {
      const ans = (answers[i] || "").toLowerCase();
      const found = ans && ans.includes(kw.toLowerCase());
      const cls = ans ? (found ? "found" : "missing") : "";
      return `<span class="kw-tag ${cls}" title="${found ? '포함됨' : ans ? '미포함' : '답변 없음'}">${kw}</span>`;
    }).join("");

    const bodyOpen = (answers[i] || verdict !== "none") ? "open" : "";

    ql.innerHTML += `
      <div class="q-card ${cardClass}" id="card-${i}">
        <div class="q-header" onclick="toggleBody(${i})">
          <div class="q-num">${i+1}</div>
          <div class="q-text">
            <div class="q-title">${q.q}</div>
            <div class="q-meta">유형: ${q.type} · 핵심 키워드 ${q.keywords.length}개</div>
          </div>
          <span class="q-badge ${badgeClass}">${badgeText}</span>
        </div>
        <div class="q-body ${bodyOpen}" id="body-${i}">
          <div class="field-label">핵심 키워드 (답변에 포함되어야 할 내용)</div>
          <div class="keyword-list" id="kw-${i}">${kwHtml}</div>
          <div class="field-label">실제 챗봇 답변 붙여넣기</div>
          <textarea class="answer-box" id="ans-${i}" placeholder="챗봇에 위 질문을 입력하고 답변을 여기에 붙여넣으세요..."
            oninput="saveAnswer(${i})" rows="5">${answers[i] || ""}</textarea>
          <div class="judge-row">
            <button class="judge-btn judge-pass ${verdict==='pass'?'active':''}" onclick="setVerdict(${i},'pass')">✅ 합격</button>
            <button class="judge-btn judge-fail ${verdict==='fail'?'active':''}" onclick="setVerdict(${i},'fail')">❌ 불합격</button>
            <button class="judge-btn judge-skip ${verdict==='skip'?'active':''}" onclick="setVerdict(${i},'skip')">⏭ 건너뜀</button>
            <button class="btn btn-sm btn-blue auto-check-btn" onclick="autoCheck(${i})">🔍 자동 체크</button>
          </div>
          <p class="hint">💡 키워드 자동 체크는 참고용입니다. 최종 판정은 직접 해주세요.</p>
        </div>
      </div>`;
  });
  updateScore();
}

function toggleBody(i) {
  const body = document.getElementById(`body-${i}`);
  body.classList.toggle("open");
}

function saveAnswer(i) {
  answers[i] = document.getElementById(`ans-${i}`).value;
  updateKeywords(i);
  updateScore();
}

function updateKeywords(i) {
  const set = SETS[currentSet];
  const ans = (answers[i] || "").toLowerCase();
  const kwDiv = document.getElementById(`kw-${i}`);
  if (!kwDiv) return;
  kwDiv.innerHTML = set.questions[i].keywords.map(kw => {
    const found = ans && ans.includes(kw.toLowerCase());
    const cls = ans ? (found ? "found" : "missing") : "";
    return `<span class="kw-tag ${cls}">${kw}</span>`;
  }).join("");
}

function setVerdict(i, v) {
  verdicts[i] = v;
  const card = document.getElementById(`card-${i}`);
  card.className = "q-card " + (v==="pass" ? "pass-card" : v==="fail" ? "fail-card" : v==="skip" ? "skip-card" : "");
  render();
  setTimeout(() => {
    document.getElementById(`body-${i}`).classList.add("open");
  }, 10);
}

function autoCheck(i) {
  const ans = (answers[i] || "").toLowerCase();
  if (!ans) { alert("먼저 답변을 붙여넣어 주세요."); return; }
  const set = SETS[currentSet];
  const kws = set.questions[i].keywords;
  const found = kws.filter(k => ans.includes(k.toLowerCase())).length;
  const ratio = found / kws.length;
  const v = ratio >= 0.6 ? "pass" : "fail";
  verdicts[i] = v;
  render();
  setTimeout(() => { document.getElementById(`body-${i}`).classList.add("open"); }, 10);
}

function autoCheckAll() {
  const set = SETS[currentSet];
  set.questions.forEach((q, i) => {
    if (answers[i]) autoCheck(i);
  });
}

function updateScore() {
  const set = SETS[currentSet];
  const total = set.questions.length;
  const pass = Object.values(verdicts).filter(v=>v==="pass").length;
  const fail = Object.values(verdicts).filter(v=>v==="fail").length;
  const done = Object.values(verdicts).filter(v=>v!==undefined).length;
  const judged = pass + fail;
  const pct = judged > 0 ? Math.round(pass / judged * 100) : 0;

  document.getElementById("sc-total").textContent = total;
  document.getElementById("sc-pass").textContent = pass;
  document.getElementById("sc-fail").textContent = fail;
  document.getElementById("sc-pct").textContent = pct + "%";
  document.getElementById("prog-label").textContent = `${done} / ${total} 완료`;
  document.getElementById("prog-fill").style.width = Math.round(done/total*100) + "%";
}

function showResult() {
  const set = SETS[currentSet];
  const total = set.questions.length;
  const pass = Object.values(verdicts).filter(v=>v==="pass").length;
  const fail = Object.values(verdicts).filter(v=>v==="fail").length;
  const skip = Object.values(verdicts).filter(v=>v==="skip").length;
  const judged = pass + fail;
  const pct = judged > 0 ? Math.round(pass / judged * 100) : 0;
  const grade = pct >= 90 ? "🏆 우수" : pct >= 70 ? "✅ 양호" : pct >= 50 ? "⚠️ 보통" : "❌ 미흡";
  const color = pct >= 90 ? "#375623" : pct >= 70 ? "#2E75B6" : pct >= 50 ? "#856404" : "#C00000";

  document.getElementById("resultGrid").innerHTML = `
    <div class="result-item"><div class="rn" style="color:var(--navy)">${total}</div><div class="rl">전체 문항</div></div>
    <div class="result-item"><div class="rn" style="color:#375623">${pass}</div><div class="rl">합격 ✅</div></div>
    <div class="result-item"><div class="rn" style="color:#C00000">${fail}</div><div class="rl">불합격 ❌</div></div>
    <div class="result-item"><div class="rn" style="color:var(--orange)">${pct}%</div><div class="rl">합격률</div></div>`;
  document.getElementById("resultFill").style.cssText = `width:${pct}%; background: linear-gradient(90deg, ${color}, ${color}aa);`;
  document.getElementById("resultComment").textContent = `${grade} — ${judged}문항 평가 완료`;
  document.getElementById("resultComment").style.color = color;

  let detail = `[챗봇 성능 점검 결과] ${new Date().toLocaleDateString('ko-KR')}\n세트: ${set.name}\n${'─'.repeat(40)}\n`;
  set.questions.forEach((q, i) => {
    const v = verdicts[i] || "미평가";
    const icon = v==="pass"?"✅":v==="fail"?"❌":v==="skip"?"⏭":"⬜";
    detail += `${icon} Q${i+1}. ${q.q}\n   유형: ${q.type} | 판정: ${v}\n`;
  });
  detail += `${'─'.repeat(40)}\n합격: ${pass}  불합격: ${fail}  건너뜀: ${skip}\n합격률: ${pct}%  등급: ${grade}`;
  document.getElementById("resultDetail").textContent = detail;
  document.getElementById("exportContent").textContent = detail;
  document.getElementById("resultModal").classList.add("open");
}

function openImport() { document.getElementById("importModal").classList.add("open"); }
function openExport() {
  showResult();
  closeModal("resultModal");
  document.getElementById("exportModal").classList.add("open");
}
function closeModal(id) { document.getElementById(id).classList.remove("open"); }

function applyImport() {
  try {
    const data = JSON.parse(document.getElementById("importText").value);
    if (!data.name || !data.questions) throw new Error("형식 오류");
    const key = "imported_" + Date.now();
    SETS[key] = data;
    const sel = document.getElementById("setSelect");
    const opt = document.createElement("option");
    opt.value = key; opt.text = data.name; opt.selected = true;
    sel.appendChild(opt);
    closeModal("importModal");
    loadSet(key);
    alert(`"${data.name}" 세트가 등록되었습니다!`);
  } catch(e) {
    alert("JSON 형식을 확인해주세요: " + e.message);
  }
}

function copyExport() {
  const txt = document.getElementById("exportContent").textContent || document.getElementById("resultDetail").textContent;
  navigator.clipboard.writeText(txt).then(() => alert("복사되었습니다!"));
}

function resetAll() {
  if (!confirm("모든 답변과 판정을 초기화할까요?")) return;
  answers = {}; verdicts = {}; render();
}

loadSet("qc");
</script>
</body>
</html>
